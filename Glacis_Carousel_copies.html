<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glacis — Order Intake Carousel</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;font-family:'DM Sans',sans-serif;color:#fff;min-height:100vh;display:flex;justify-content:center;padding:20px}
.wrap{max-width:440px;width:100%}
.title{font-size:16px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.slide{width:100%;aspect-ratio:4/5;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;justify-content:center;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.dots{display:flex;justify-content:center;gap:6px;margin-top:16px}
.dot{width:8px;height:8px;border-radius:4px;background:#333;border:none;cursor:pointer;transition:all .2s;padding:0}
.dot.active{width:20px;background:#3DCD58}
.nav{display:flex;justify-content:space-between;margin-top:16px}
.nav button{padding:10px 20px;background:#222;border:none;border-radius:8px;color:#888;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif}
.nav button:hover{background:#333;color:#aaa}
.count{color:#555;font-size:13px;align-self:center}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab.active{background:#3DCD58;color:#0B1A14}
.tab:not(.active){background:#222;color:#888}
</style>
</head>
<body>
<div class="wrap">
<div class="tabs" id="tabs"></div>
<div class="title" id="vt"></div>
<div class="sub" id="vs"></div>
<div class="slide" id="sl"></div>
<div class="dots" id="dt"></div>
<div class="nav"><button onclick="pr()">← Previous</button><span class="count" id="ct"></span><button onclick="nx()">Next →</button></div>
</div>
<script>
var G='#3DCD58',D='#0B1A14',T='#F7F5F0',M='#8BA89A',ML='#C5E8D4',P='#1A2E23',SF="font-family:'Instrument Serif',Georgia,serif";

function tag(cls,text){return '<div style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;'+
(cls==='myth'?'background:rgba(200,50,50,.15);color:#E07070':cls==='reality'?'background:rgba(61,205,88,.12);color:'+G:'color:'+G+';letter-spacing:2px')+'">'+text+'</div>';}
function h(size,text){return '<div style="'+SF+';font-size:'+size+'px;color:'+T+';line-height:1.3;margin-bottom:16px">'+text+'</div>';}
function body(text){return '<div style="font-size:14px;color:'+M+';line-height:1.75">'+text+'</div>';}
function panel(text){return '<div style="padding:12px 16px;background:'+P+';border-radius:8px;font-size:13px;color:'+ML+';margin-top:16px">'+text+'</div>';}
function divr(c){return '<div style="width:40px;height:2px;background:rgba('+(c==='r'?'200,50,50':'61,205,88')+',.4);margin-bottom:20px"></div>';}
function proof(name,text){return '<div style="display:flex;gap:10px;padding:10px 12px;background:'+P+';border-radius:8px;margin-bottom:8px"><div style="width:6px;height:6px;border-radius:50%;background:'+G+';margin-top:5px;flex-shrink:0"></div><div><div style="font-size:12px;color:'+G+';font-weight:600;margin-bottom:2px">'+name+'</div><div style="font-size:12px;color:'+ML+';line-height:1.5">'+text+'</div></div></div>';}
function stat(num,label){return '<div style="padding:12px 10px;background:'+P+';border-radius:8px;text-align:center"><div style="'+SF+';font-size:22px;color:'+G+';margin-bottom:4px">'+num+'</div><div style="font-size:11px;color:'+M+';line-height:1.4">'+label+'</div></div>';}
function numcard(n,bg,content){return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><div style="width:36px;height:36px;border-radius:8px;background:'+P+';display:flex;align-items:center;justify-content:center;'+SF+';font-size:20px;color:'+G+'">'+n+'</div><div>'+content+'</div></div>';}
function cta(text,sub){return '<div style="padding:36px 28px;text-align:center"><div style="'+SF+';font-size:24px;color:'+T+';line-height:1.35;margin-bottom:16px">'+text+'</div><div style="font-size:14px;color:'+ML+';margin-bottom:28px;line-height:1.65">'+sub+'</div><div style="display:inline-block;padding:13px 30px;background:'+G+';color:'+D+';border-radius:8px;font-weight:700;font-size:14px;margin-bottom:12px">Read the full report</div><div style="font-size:12px;color:'+M+';margin-top:10px">glacis.com/insights</div><div style="margin-top:20px;font-size:13px;color:'+M+'">Philipp Gutheim · Founder & CEO, Glacis</div></div>';}
function row3(label,before,after,change){return '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 12px;background:'+P+';border-radius:8px;margin-bottom:8px"><div><div style="font-size:10px;color:'+M+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">'+label+'</div><div style="font-size:12px;color:#E07070">'+before+'</div></div><div><div style="font-size:10px;color:'+M+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">After</div><div style="font-size:12px;color:'+ML+'">'+after+'</div></div><div style="text-align:right"><div style="font-size:10px;color:'+M+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Change</div><div style="font-size:13px;color:'+G+';font-weight:700">'+change+'</div></div></div>';}
function step(n,text){return '<div style="display:flex;gap:10px;align-items:start"><div style="font-size:11px;color:'+M+';min-width:16px;margin-top:2px">'+n+'.</div><div style="font-size:13px;color:'+ML+';line-height:1.5">'+text+'</div></div>';}
function patternItem(n,text){return '<div style="display:flex;gap:12px;align-items:start;margin-bottom:8px"><div style="width:20px;height:20px;border-radius:50%;background:'+P+';border:1px solid '+G+';display:flex;align-items:center;justify-content:center;font-size:10px;color:'+G+';flex-shrink:0">'+n+'</div><div style="font-size:13px;color:'+ML+';line-height:1.5">'+text+'</div></div>';}

var bg1='linear-gradient(160deg,'+D+',#0E2018)';
var bg2='linear-gradient(135deg,'+D+',#1A0A0A)';
var bg3='linear-gradient(135deg,#0B1A14,#0D2015)';
var bg4='linear-gradient(135deg,'+D+',#1A2A1A)';
var bg5='linear-gradient(135deg,'+D+',#1A1A0A)';
var bgc='linear-gradient(135deg,#1A3A2A,#2D6A4F)';

var V={
myth:{t:"Myth vs. Reality",s:"Contrarian framework · Thought leadership · Awareness stage",sl:[
{b:bg1,h:'<div style="padding:44px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:20px">Glacis · Order Intake Intelligence</div>'+h(30,'4 things operations leaders believe about order intake.')+'<div style="'+SF+';font-size:22px;color:#6B8A7A;line-height:1.3;margin-bottom:24px">The data disagrees with all of them.</div><div style="display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:'+G+'"></div><div style="font-size:12px;color:'+M+'">Swipe to see each myth →</div></div></div>'},
{b:bg2,h:'<div style="padding:36px 28px">'+tag('myth','Myth 1 of 4')+h(26,'"Our customers will eventually switch to EDI."')+divr('r')+body('Operations teams have believed this for a decade. EDI adoption among mid-market B2B buyers has been flat since 2018.')+'</div>'},
{b:bg3,h:'<div style="padding:36px 28px">'+tag('reality','Reality')+h(26,'Non-EDI order volume is growing, not shrinking.')+divr('g')+body('Email, PDF, and portal orders now account for 60–70% of B2B order intake at most manufacturers.')+panel("The manufacturers winning this decade adapt to their customers' workflows. Not the other way around.")+'</div>'},
{b:bg2,h:'<div style="padding:36px 28px">'+tag('myth','Myth 2 of 4')+h(26,'"Manual entry is unavoidable at our order volume."')+divr('r')+body('When you process 300+ orders a day from 12 formats, automation feels impossible. But Pfizer and Carlsberg had the same complexity — and both automated it.')+'</div>'},
{b:bg3,h:'<div style="padding:36px 28px">'+tag('reality','Reality')+'<div style="'+SF+';font-size:24px;color:'+T+';line-height:1.3;margin-bottom:20px">Format variation is the problem AI was built for.</div>'+proof('Pfizer','10 markets, multiple SKU formats → automated')+proof('Carlsberg','Unstructured distributor orders → structured ERP entries')+proof('$10B Manufacturer','93% processing time reduction in first deployment')+'</div>'},
{b:bg2,h:'<div style="padding:36px 28px">'+tag('myth','Myth 3 of 4')+h(26,'"We\'d need to replace our ERP first."')+divr('r')+body('ERP migrations take 2–4 years. If order intake automation required one, it would be dead on arrival.')+'</div>'},
{b:bg3,h:'<div style="padding:36px 28px">'+tag('reality','Reality')+'<div style="'+SF+';font-size:24px;color:'+T+';line-height:1.3;margin-bottom:20px">The AI layer sits on top of what you already have.</div>'+body('Siemens, Schneider Electric, and Pfizer all ran SAP. No migration, no re-platforming.')+panel('Deployment measured in weeks. One inbox, one ERP connection.')+'</div>'},
{b:bg2,h:'<div style="padding:36px 28px">'+tag('myth','Myth 4 of 4')+h(26,'"The ROI takes years to show up."')+divr('r')+body('This myth kills more automation projects than any technical barrier. Operations leaders assume the business case can\'t clear a 12-month review cycle.')+'</div>'},
{b:bg3,h:'<div style="padding:36px 28px">'+tag('reality','Reality')+'<div style="'+SF+';font-size:24px;color:'+T+';line-height:1.3;margin-bottom:20px">Month one carries measurable ROI.</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+stat('93%','reduction in processing time')+stat('$8–14','saved per order, day one')+stat('2.5%','error rate eliminated')+stat('Weeks','to full deployment')+'</div></div>'},
{b:bgc,h:cta('The full research covers all four myths — with the data behind each one.','Named benchmarks from Pfizer, Siemens, Carlsberg, Schneider Electric, and a full $10B manufacturer case study.')}
]},

transformations:{t:"The 5 Transformations",s:"Social proof listicle · Authority building · Awareness stage",sl:[
{b:bg1,h:'<div style="padding:44px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:20px">Glacis · Order Intake Intelligence</div>'+h(30,'5 companies eliminated manual order entry.')+'<div style="'+SF+';font-size:22px;color:#6B8A7A;line-height:1.35;margin-bottom:24px">Same problem. Different industries.</div><div style="font-size:13px;color:'+M+';line-height:1.6">Here\'s what each one did — and what happened after.</div></div>'},
{b:bg3,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">The common thread</div><div style="'+SF+';font-size:24px;color:'+T+';line-height:1.3;margin-bottom:20px">Each company had the same bottleneck: a human being in the middle of every order.</div>'+body('Email arrives. Someone opens it. Reads it. Types it into the ERP. Checks it. Sends confirmation. Repeat — hundreds of times a day.')+panel("The bottleneck isn't volume. It's the format. These companies found a way around it.")+'</div>'},
{b:bg3,h:'<div style="padding:32px 28px">'+numcard('1','<div style="font-size:11px;color:'+M+';letter-spacing:1px;text-transform:uppercase">Pharma · Global</div><div style="font-size:16px;color:'+T+';font-weight:600">Pfizer</div>')+'<div style="'+SF+';font-size:22px;color:'+T+';line-height:1.3;margin-bottom:16px">Scaled order automation across 10 markets in 6 months.</div>'+body('Challenge: High-volume, multi-format distributor orders across regional markets with different product catalogs.')+panel('Result: Consistent processing times across all markets. Local teams redeployed to exception handling.')+'</div>'},
{b:bg3,h:'<div style="padding:32px 28px">'+numcard('2','<div style="font-size:11px;color:'+M+';letter-spacing:1px;text-transform:uppercase">Industrial · Global</div><div style="font-size:16px;color:'+T+';font-weight:600">Siemens</div>')+'<div style="'+SF+';font-size:22px;color:'+T+';line-height:1.3;margin-bottom:16px">Cut order processing time by over 80%. Without touching their SAP stack.</div>'+body('Challenge: Dense technical orders from industrial customers in unstructured formats.')+panel('Result: AI layer sits between inbox and SAP. No migration. Orders flow through in minutes.')+'</div>'},
{b:bg4,h:'<div style="padding:40px 28px;text-align:center"><div style="'+SF+';font-size:14px;color:'+M+';line-height:1.6;margin-bottom:16px;font-style:italic">"Two down. Three to go."</div><div style="'+SF+';font-size:24px;color:'+T+';line-height:1.3;margin-bottom:16px">One pattern is already clear.</div>'+body('Neither Pfizer nor Siemens changed how their customers send orders. They changed how their own systems receive them.')+panel('The leverage is on the intake side — not the customer side.')+'</div>'},
{b:bg3,h:'<div style="padding:32px 28px">'+numcard('3','<div style="font-size:11px;color:'+M+';letter-spacing:1px;text-transform:uppercase">FMCG · Global</div><div style="font-size:16px;color:'+T+';font-weight:600">Carlsberg</div>')+'<div style="'+SF+';font-size:22px;color:'+T+';line-height:1.3;margin-bottom:16px">Automated distributor orders across multiple languages and formats.</div>'+body('Challenge: Thousands of distributor orders daily in inconsistent formats across markets.')+panel('Result: Unstructured orders automatically parsed, validated, and entered — regardless of format.')+'</div>'},
{b:bg3,h:'<div style="padding:32px 28px">'+numcard('4','<div style="font-size:11px;color:'+M+';letter-spacing:1px;text-transform:uppercase">Energy · Global</div><div style="font-size:16px;color:'+T+';font-weight:600">Schneider Electric</div>')+'<div style="'+SF+';font-size:22px;color:'+T+';line-height:1.3;margin-bottom:16px">Removed manual entry from the order confirmation loop entirely.</div>'+body('Challenge: Complex B2B orders with pricing exceptions and contract terms requiring human review.')+panel('Result: AI handles straight-through processing. Humans only touch the 3% that need judgment.')+'</div>'},
{b:bg3,h:'<div style="padding:32px 28px">'+numcard('5','<div style="font-size:11px;color:'+M+';letter-spacing:1px;text-transform:uppercase">Manufacturing · $10B</div><div style="font-size:16px;color:'+T+';font-weight:600">Anonymous Case Study</div>')+'<div style="'+SF+';font-size:22px;color:'+T+';line-height:1.3;margin-bottom:16px">93% reduction in order processing time. First deployment.</div>'+body('A $10B global manufacturer processing hundreds of non-EDI orders daily.')+panel('From email to ERP entry in under 3 minutes. Previously: 25+ minutes per order.')+'</div>'},
{b:bg4,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">The pattern</div><div style="'+SF+';font-size:24px;color:'+T+';line-height:1.3;margin-bottom:20px">All 5 companies share four decisions.</div>'+patternItem('1','They accepted that customers won\'t change their formats')+patternItem('2','They kept their existing ERP — no migration')+patternItem('3','They deployed in weeks, not quarters')+patternItem('4','They measured ROI from month one, not year three')+'</div>'},
{b:bg4,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">For you</div><div style="'+SF+';font-size:24px;color:'+T+';line-height:1.3;margin-bottom:20px">What would a 6th transformation look like at your company?</div>'+body('The full research includes a live ROI calculator. Enter your order volume and manual cost per order. See the number in 30 seconds.')+panel('Median result for 300 orders/day at $12/order: $450K+ in annual processing savings.')+'</div>'},
{b:bgc,h:cta('Read the benchmarks. Use the calculator. See the case study.','All 5 companies covered in detail — plus full methodology and a live savings estimator.')}
]},

inaction:{t:"Cost of Inaction",s:"PAS framework · Decision stage · Direct buyer",sl:[
{b:bg1,h:'<div style="padding:44px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:20px">Glacis · Order Intake Intelligence</div>'+h(30,'Your team processes hundreds of orders a day.')+'<div style="'+SF+';font-size:22px;color:#6B8A7A;line-height:1.35">Most of them shouldn\'t need a human.</div></div>'},
{b:bg3,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">The problem</div><div style="'+SF+';font-size:26px;color:'+T+';line-height:1.3;margin-bottom:20px">Every non-EDI order runs the same expensive loop.</div><div style="display:flex;flex-direction:column;gap:6px">'+step(1,'Email arrives in shared inbox')+step(2,'Someone opens it. Reads it. Interprets it.')+step(3,'Types order data into the ERP')+step(4,'Checks for errors. Sends confirmation.')+step(5,'Repeat. 300 more times today.')+'</div></div>'},
{b:bg3,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">What it costs</div><div style="'+SF+';font-size:26px;color:'+T+';line-height:1.3;margin-bottom:20px">At 300 orders/day, the math is not subtle.</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'+stat('$900K','Annual manual processing cost')+stat('750','Orders carrying entry errors yearly')+stat('25 min','Average time per order')+stat('$75K+','Annual error correction cost')+'</div><div style="font-size:12px;color:'+M+';font-style:italic">Based on industry averages · 300 orders/day · $12/order · 2.5% error rate</div></div>'},
{b:bg5,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:#E0C870;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">The compounding problem</div><div style="'+SF+';font-size:26px;color:'+T+';line-height:1.3;margin-bottom:20px">The cost of doing nothing compounds every year.</div>'+body('Order volume grows. Error rates hold steady. By year three, you\'ve spent $2.7M on a workflow that AI could handle for under $200K.')+'<div style="padding:12px 16px;background:#1A1A0A;border-radius:8px;font-size:13px;color:#E8D890;border:1px solid rgba(200,180,50,.15);margin-top:16px">The companies that automated in 2021 have already recovered their investment three times over.</div></div>'},
{b:bg3,h:'<div style="padding:36px 28px;text-align:center"><div style="'+SF+';font-size:14px;color:'+M+';line-height:1.6;margin-bottom:16px;font-style:italic">"But we\'ve always done it this way."</div><div style="'+SF+';font-size:26px;color:'+T+';line-height:1.3;margin-bottom:20px">So did Pfizer. Siemens. Carlsberg. Schneider Electric.</div>'+body('All four ran fully manual intake until they didn\'t. All four deployed in weeks. All four measured ROI from month one.')+'</div>'},
{b:bg3,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">What changes</div><div style="'+SF+';font-size:26px;color:'+T+';line-height:1.3;margin-bottom:20px">Email arrives. Order enters ERP. No one types anything.</div>'+proof('Inbox → ERP','Under 3 minutes. Fully automated.')+proof('Error rate','Near zero. AI validates against catalog before submission.')+proof('Your team','Handles exceptions — the 3% that genuinely need judgment.')+'</div>'},
{b:bg3,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">How fast</div><div style="'+SF+';font-size:26px;color:'+T+';line-height:1.3;margin-bottom:20px">Deployed in weeks. Integrated with your existing ERP.</div>'+body('The AI layer reads emails and PDFs, extracts structured order data, and pushes it into SAP, Oracle, or your current system.')+'<div style="display:flex;gap:10px;margin-top:16px"><div style="flex:1;padding:10px 8px;background:'+P+';border-radius:8px;text-align:center"><div style="font-size:11px;color:'+G+';margin-bottom:4px;font-weight:600">Weeks 1–2</div><div style="font-size:10px;color:'+M+';line-height:1.4">Integration setup</div></div><div style="flex:1;padding:10px 8px;background:'+P+';border-radius:8px;text-align:center"><div style="font-size:11px;color:'+G+';margin-bottom:4px;font-weight:600">Weeks 3–4</div><div style="font-size:10px;color:'+M+';line-height:1.4">Validation & go-live</div></div><div style="flex:1;padding:10px 8px;background:'+P+';border-radius:8px;text-align:center"><div style="font-size:11px;color:'+G+';margin-bottom:4px;font-weight:600">Month 2</div><div style="font-size:10px;color:'+M+';line-height:1.4">Full production</div></div></div></div>'},
{b:bg3,h:'<div style="padding:36px 28px"><div style="font-size:11px;color:'+G+';letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">Real numbers</div><div style="'+SF+';font-size:22px;color:'+T+';line-height:1.3;margin-bottom:20px">From a $10B manufacturer. First deployment.</div>'+row3('Processing','25+ min/order','Under 3 min','−93%')+row3('Error rate','2.5%','~0.1%','−96%')+row3('Cost/order','$12–18','$1.77–5','−70%')+'</div>'},
{b:'linear-gradient(135deg,#1A0A0A,#0D2015)',h:'<div style="padding:44px 28px;text-align:center"><div style="'+SF+';font-size:14px;color:'+M+';line-height:1.6;margin-bottom:24px;font-style:italic">"The question isn\'t whether to automate order intake. It\'s how long you wait."</div><div style="'+SF+';font-size:24px;color:'+T+';line-height:1.3;margin-bottom:20px">Every month of delay is a calculable number.</div><div style="padding:14px 18px;background:'+P+';border-radius:8px;font-size:14px;color:'+ML+';line-height:1.6">At 300 orders/day: approximately <span style="color:'+G+';font-weight:700">$75,000</span> in avoidable processing cost per month of inaction.</div></div>'},
{b:bgc,h:'<div style="padding:36px 28px;text-align:center"><div style="'+SF+';font-size:24px;color:'+T+';line-height:1.35;margin-bottom:16px">Run the numbers on your order volume.</div><div style="font-size:14px;color:'+ML+';margin-bottom:12px;line-height:1.65">The full report includes a live ROI calculator — enter your orders per day and cost per order. See your number in 30 seconds.</div><div style="font-size:13px;color:'+M+';margin-bottom:24px;line-height:1.6">Plus named benchmarks from Pfizer, Siemens, Carlsberg, Schneider Electric, and the full $10B case study.</div><div style="display:inline-block;padding:13px 30px;background:'+G+';color:'+D+';border-radius:8px;font-weight:700;font-size:14px;margin-bottom:12px">Calculate your savings</div><div style="font-size:12px;color:'+M+';margin-top:10px">glacis.com/insights</div><div style="margin-top:20px;font-size:13px;color:'+M+'">Philipp Gutheim · Founder & CEO, Glacis</div></div>'}
]}
};

var cv='myth',ci=0;
function rn(){var v=V[cv],s=v.sl[ci];
document.getElementById('tabs').innerHTML=Object.keys(V).map(function(k){return'<button class="tab '+(k===cv?'active':'')+'" onclick="sw(\''+k+'\')">'+V[k].t+'</button>'}).join('');
document.getElementById('vt').textContent=v.t;
document.getElementById('vs').textContent=v.s;
var e=document.getElementById('sl');e.style.background=s.b;e.innerHTML=s.h;
document.getElementById('dt').innerHTML=v.sl.map(function(_,i){return'<button class="dot '+(i===ci?'active':'')+'" onclick="go('+i+')"></button>'}).join('');
document.getElementById('ct').textContent=(ci+1)+' / '+v.sl.length;}
function sw(k){cv=k;ci=0;rn()}
function go(i){ci=i;rn()}
function pr(){if(ci>0){ci--;rn()}}
function nx(){if(ci<V[cv].sl.length-1){ci++;rn()}}
var tx=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX});
document.addEventListener('touchend',function(e){var d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>50){d>0?nx():pr()}});
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight')nx();if(e.key==='ArrowLeft')pr()});
rn();
</script>
</body>
</html>
